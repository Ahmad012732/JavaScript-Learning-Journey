<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form action="login" class="card">
            <div class="input-container">
               <input type="email" name="email" id="input-email" placeholder="Enter email">
            </div>
            <div class="input-container">
                <input type="password" name="password" id="input-password" placeholder="Enter password">
            </div>
            <button id="login-btn">Login</button>
        </form>
        <label for="checkbox"><input type="checkbox" name="checkbox" id="checkbox">Remember me</label>
        <div class="hidden">
            <p class="p-hidden"></p>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
