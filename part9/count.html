<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
</head>
<body style="display: flex;justify-content: center; align-items: center; margin-top: 20%;">
    <div style="align-items: center; display: flex; flex-direction: column; border-radius: 20px;background-color: gainsboro; height:200px; width: 250px;">
        <h1>Tazbih</h1>
        <h2 id="count"></h2>
        <div style="display: flex;gap: 10px;">
            <div><button id="add" style="padding: 8px; border-radius: 5px; width: 50px;">+</button></div>
            <div><button id="sub" style="padding: 8px; border-radius: 5px; width: 50px;">-</button></div>
            <div><button id="reset" style="padding: 8px; border-radius: 5px; width: 70px;">Reset</button></div>
        </div>
    </div>

    <script src="cnt.js"></script>
</body>
</html>
